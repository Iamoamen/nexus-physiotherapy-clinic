<!-- pages/faq.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main th:fragment="content">

<section class="page-header">
    <div class="container text-center">
        <span class="section-tag-light" th:text="#{faq.page.tag}">Help Centre</span>
        <h1 class="page-header-title text-white" th:text="#{faq.page.title}">Frequently Asked Questions</h1>
        <p class="page-header-subtitle text-light" th:text="#{faq.page.subtitle}">Everything you need to know before your first visit.</p>
    </div>
</section>

<section class="section-padding">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="accordion nexus-accordion" id="faqPage">
                    <div th:each="faq, iter : ${faqs}" class="accordion-item"
                         data-aos="fade-up" th:attr="data-aos-delay=${iter.index * 40}">
                        <h3 class="accordion-header" th:id="|ph${iter.index}|">
                            <button class="accordion-button collapsed" type="button"
                                    data-bs-toggle="collapse"
                                    th:data-bs-target="|#pb${iter.index}|">
                                <span th:text="${#locale.language == 'ar' and faq.questionAr != null} ? ${faq.questionAr} : ${faq.questionEn}">Question</span>
                            </button>
                        </h3>
                        <div th:id="|pb${iter.index}|" class="accordion-collapse collapse"
                             data-bs-parent="#faqPage">
                            <div class="accordion-body"
                                 th:text="${#locale.language == 'ar' and faq.answerAr != null} ? ${faq.answerAr} : ${faq.answerEn}">Answer</div>
                        </div>
                    </div>
                </div>

                <div class="text-center mt-5 p-4 rounded-4" style="background:var(--nexus-off-white);border:1px solid rgba(0,0,0,0.07);">
                    <h5 class="mb-2" th:text="#{faq.still-questions}">Still have questions?</h5>
                    <p class="text-muted mb-3" th:text="#{faq.page.subtitle}">Our team is happy to help.</p>
                    <div class="d-flex gap-3 justify-content-center flex-wrap">
                        <a th:href="@{/contact}" class="btn btn-nexus-outline" th:text="#{faq.contact-link}">Contact Us</a>
                        <a href="https://wa.me/201035411305" target="_blank" class="btn btn-whatsapp">
                            <i class="fa-brands fa-whatsapp me-1"></i>
                            <span th:text="#{topbar.whatsapp}">WhatsApp</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

</main>
</html>
