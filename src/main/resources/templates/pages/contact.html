<!-- pages/contact.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main th:fragment="content">

<section class="page-header">
    <div class="container text-center">
        <span class="section-tag-light" th:text="#{contact.tag}">Get In Touch</span>
        <h1 class="page-header-title text-white" th:text="#{contact.title}">Contact Us</h1>
        <p class="page-header-subtitle text-light" th:text="#{contact.subtitle}">We're here to help.</p>
    </div>
</section>

<section class="section-padding">
    <div class="container">
        <div class="row g-5">

            <!-- Contact Form -->
            <div class="col-lg-7" data-aos="fade-right">
                <div class="booking-card">
                    <div class="booking-card-header">
                        <i class="fa-solid fa-envelope me-2"></i>
                        <span th:text="#{contact.form.header}">Send Us a Message</span>
                    </div>

                    <div th:if="${successMsg}" class="alert alert-success mx-4 mt-3">
                        <i class="fa-solid fa-circle-check me-2"></i>
                        <span th:text="${successMsg}"></span>
                    </div>

                    <form th:action="@{/contact}" method="post" th:object="${contactForm}" class="p-4">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">
                                    <span th:text="#{contact.name}">Full Name</span>
                                    <span class="text-danger ms-1">*</span>
                                </label>
                                <input type="text" class="form-control nexus-input"
                                       th:field="*{name}"
                                       th:classappend="${#fields.hasErrors('name')} ? is-invalid"
                                       th:placeholder="#{contact.name.placeholder}"/>
                                <div class="invalid-feedback" th:errors="*{name}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">
                                    <span th:text="#{contact.phone}">Phone</span>
                                    <span class="text-danger ms-1">*</span>
                                </label>
                                <input type="tel" class="form-control nexus-input"
                                       th:field="*{phone}"
                                       th:classappend="${#fields.hasErrors('phone')} ? is-invalid"
                                       th:placeholder="#{contact.phone.placeholder}"/>
                                <div class="invalid-feedback" th:errors="*{phone}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label" th:text="#{contact.email}">Email</label>
                                <input type="email" class="form-control nexus-input"
                                       th:field="*{email}"
                                       th:placeholder="#{contact.email.placeholder}"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label">
                                    <span th:text="#{contact.subject}">Subject</span>
                                    <span class="text-danger ms-1">*</span>
                                </label>
                                <input type="text" class="form-control nexus-input"
                                       th:field="*{subject}"
                                       th:classappend="${#fields.hasErrors('subject')} ? is-invalid"
                                       th:placeholder="#{contact.subject.placeholder}"/>
                                <div class="invalid-feedback" th:errors="*{subject}"></div>
                            </div>
                            <div class="col-12">
                                <label class="form-label">
                                    <span th:text="#{contact.message}">Message</span>
                                    <span class="text-danger ms-1">*</span>
                                </label>
                                <textarea class="form-control nexus-input" th:field="*{message}"
                                          th:classappend="${#fields.hasErrors('message')} ? is-invalid"
                                          rows="5" th:placeholder="#{contact.message.placeholder}"></textarea>
                                <div class="invalid-feedback" th:errors="*{message}"></div>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-nexus-cta">
                                    <i class="fa-solid fa-paper-plane me-2"></i>
                                    <span th:text="#{contact.submit}">Send Message</span>
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Contact Info -->
            <div class="col-lg-5" data-aos="fade-left">
                <div th:each="branch : ${branches}" class="booking-info-card mb-4">
                    <h5 class="text-nexus-green"
                        th:text="${#locale.language == 'ar'} ? ${branch.nameAr} : ${branch.nameEn}">Branch Name</h5>
                    <ul class="list-unstyled mt-3">
                        <li class="d-flex gap-3 mb-3">
                            <i class="fa-solid fa-location-dot text-nexus-green mt-1"></i>
                            <span th:text="${#locale.language == 'ar'} ? ${branch.addressAr} : ${branch.addressEn}">Address</span>
                        </li>
                        <li class="d-flex gap-3 mb-3">
                            <i class="fa-solid fa-phone text-nexus-green mt-1"></i>
                            <a th:href="'tel:' + ${branch.phone}" class="contact-link" th:text="${branch.phone}">Phone</a>
                        </li>
                        <li class="d-flex gap-3 mb-3">
                            <i class="fa-brands fa-whatsapp text-nexus-green mt-1"></i>
                            <a th:href="'https://wa.me/' + ${branch.whatsapp}" target="_blank"
                               class="contact-link" th:text="#{footer.whatsapp}">WhatsApp Us</a>
                        </li>
                    </ul>
                    <div class="d-flex gap-2 mt-3">
                        <a th:href="@{/book}" class="btn btn-nexus-cta btn-sm" th:text="#{services.book-now}">Book Now</a>
                        <a th:href="'https://wa.me/' + ${branch.whatsapp}" target="_blank" class="btn btn-whatsapp btn-sm">
                            <i class="fa-brands fa-whatsapp me-1"></i>
                            <span th:text="#{topbar.whatsapp}">WhatsApp</span>
                        </a>
                    </div>
                </div>

                <div class="booking-info-card">
                    <h5>
                        <i class="fa-solid fa-clock me-2 text-nexus-green"></i>
                        <span th:text="#{booking.hours}">Working Hours</span>
                    </h5>
                    <ul class="working-hours-list">
                        <li><span th:text="#{day.MONDAY} + ' – ' + #{day.THURSDAY}">Mon – Thu</span><span>9:00 AM – 8:00 PM</span></li>
                        <li><span th:text="#{day.FRIDAY}">Friday</span><span>9:00 AM – 1:00 PM</span></li>
                        <li><span th:text="#{day.SATURDAY}">Saturday</span><span>9:00 AM – 5:00 PM</span></li>
                        <li class="closed"><span th:text="#{day.SUNDAY}">Sunday</span><span th:text="#{day.closed}">Closed</span></li>
                    </ul>
                    <p class="text-muted small mt-3" th:text="#{contact.emergency}">For urgent cases, call directly.</p>
                </div>
            </div>
        </div>
    </div>
</section>

<section class="map-section">
    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3451.9!2d31.32!3d30.09!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDA1JzI0LjAiTiAzMcKwMTknMTIuMCJF!5e0!3m2!1sen!2seg!4v1"
            width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy"
            title="Nexus Clinic Location"></iframe>
</section>

</main>
</html>
