<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}"
      th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="#{login.title}">Admin Login – Nexus Clinic</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo-icon-black.png}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <style>
        body { background: #0a0a0a; min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: 'Montserrat', sans-serif; }
        html[dir="rtl"] body { font-family: 'Cairo', sans-serif; }
        .login-card { background: #111; border: 1px solid #222; border-radius: 16px; padding: 2.5rem; width: 100%; max-width: 400px; }
        .login-logo { height: 48px; width: auto; object-fit: contain; margin-bottom: 1.5rem; }
        .login-title { color: #fff; font-size: 1.1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .login-sub { color: rgba(255,255,255,0.4); font-size: 0.82rem; margin-bottom: 2rem; }
        .login-label { color: rgba(255,255,255,0.6); font-size: 0.82rem; font-weight: 500; margin-bottom: 0.4rem; }
        .login-input { background: #1a1a1a; border: 1px solid #2a2a2a; color: #fff; border-radius: 8px; padding: 0.65rem 1rem; font-size: 0.9rem; transition: border-color 0.2s; }
        .login-input:focus { background: #1a1a1a; border-color: var(--nexus-green, #39d353); color: #fff; box-shadow: 0 0 0 3px rgba(57,211,83,0.15); }
        .login-input::placeholder { color: rgba(255,255,255,0.2); }
        .btn-login { background: var(--nexus-green, #39d353); color: #000; font-weight: 700; border: none; border-radius: 8px; padding: 0.75rem; font-size: 0.95rem; letter-spacing: 0.04em; transition: opacity 0.2s; }
        .btn-login:hover { opacity: 0.88; color: #000; }
        .alert-login { background: rgba(244,67,54,0.1); border: 1px solid rgba(244,67,54,0.3); color: #ff6b6b; border-radius: 8px; font-size: 0.83rem; padding: 0.65rem 1rem; }
        .lang-bar { position: absolute; top: 1.5rem; right: 1.5rem; display: flex; gap: 0.5rem; align-items: center; }
        html[dir="rtl"] .lang-bar { right: auto; left: 1.5rem; }
        .lang-bar a { color: rgba(255,255,255,0.4); font-size: 0.78rem; text-decoration: none; }
        .lang-bar a.active, .lang-bar a:hover { color: var(--nexus-green, #39d353); }
    </style>
</head>
<body>

    <!-- Lang switcher -->
    <div class="lang-bar">
        <a th:href="@{/login(lang=en)}" th:classappend="${#locale.language == 'en'} ? 'active'">EN</a>
        <span style="color:rgba(255,255,255,0.2);">|</span>
        <a th:href="@{/login(lang=ar)}" th:classappend="${#locale.language == 'ar'} ? 'active'">ع</a>
    </div>

    <div class="login-card">
        <div class="text-center">
            <img th:src="@{/images/logo-full-white.png}" alt="Nexus Clinic" class="login-logo"/>
        </div>
        <p class="login-title text-center" th:text="#{admin.title}">Admin Panel</p>
        <p class="login-sub text-center" th:text="#{login.sign-in}">Sign in to continue</p>

        <!-- Error -->
        <div th:if="${param.error}" class="alert-login mb-3">
            <i class="fa-solid fa-triangle-exclamation me-2"></i>
            <span th:text="#{login.invalid}">Invalid username or password.</span>
        </div>
        <div th:if="${param.logout}" class="alert alert-success mb-3 py-2 px-3" style="font-size:0.82rem;">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="#{login.logged-out}">You have been logged out.</span>
        </div>

        <form th:action="@{/login}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="mb-3">
                <label class="login-label d-block" th:text="#{login.username}">Username</label>
                <input type="text" name="username" class="form-control login-input" autocomplete="username" autofocus/>
            </div>
            <div class="mb-4">
                <label class="login-label d-block" th:text="#{login.password}">Password</label>
                <input type="password" name="password" class="form-control login-input" autocomplete="current-password"/>
            </div>
            <button type="submit" class="btn btn-login w-100">
                <i class="fa-solid fa-right-to-bracket me-2"></i><span th:text="#{login.submit}">Sign In</span>
            </button>
        </form>

        <div class="text-center mt-4">
            <a th:href="@{/}" style="color:rgba(255,255,255,0.3);font-size:0.78rem;text-decoration:none;">
                <i class="fa-solid fa-arrow-left me-1"></i>
                <span th:text="#{error.404.home}">Back to Home</span>
            </a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
