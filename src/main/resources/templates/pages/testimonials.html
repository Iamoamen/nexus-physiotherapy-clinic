<!-- pages/testimonials.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{fragments/layout :: layout(~{::main})}">
<body>
<main th:fragment="content">

<section class="page-header">
    <div class="container text-center">
        <span class="section-tag-light" th:text="#{testimonials.page.tag}">Patient Stories</span>
        <h1 class="page-header-title text-white" th:text="#{testimonials.page.title}">Success Stories</h1>
        <p class="page-header-subtitle text-light" th:text="#{testimonials.page.subtitle}">Real patients, real results.</p>
    </div>
</section>

<section class="section-padding">
    <div class="container">

        <div class="row g-4 mb-5" th:if="${not #lists.isEmpty(testimonials)}">
            <div th:each="t, iter : ${testimonials}" class="col-lg-4 col-md-6"
                 data-aos="fade-up" th:attr="data-aos-delay=${iter.index * 60}">
                <div class="card border-0 shadow-sm h-100 p-4">
                    <div class="mb-3" style="color:#ffd700;">
                        <i th:each="s : ${#numbers.sequence(1, t.rating ?: 5)}" class="fa-solid fa-star"></i>
                    </div>
                    <p class="text-muted fst-italic mb-4"
                       th:text="${#locale.language == 'ar' and t.contentAr != null} ? ${t.contentAr} : ${t.contentEn}">Review</p>
                    <div class="mt-auto d-flex align-items-center gap-3">
                        <div style="width:42px;height:42px;background:var(--nexus-green);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;font-size:1rem;flex-shrink:0;">
                            <i class="fa-solid fa-user"></i>
                        </div>
                        <div>
                            <strong th:text="${#locale.language == 'ar' and t.patientNameAr != null} ? ${t.patientNameAr} : ${t.patientName}">Name</strong>
                            <div class="small text-nexus-green" th:if="${t.condition}" th:text="${t.condition}">Condition</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div th:if="${#lists.isEmpty(testimonials)}" class="text-center py-5 text-muted">
            <i class="fa-regular fa-star fa-2x mb-3 d-block text-nexus-green"></i>
            <p th:text="#{testimonials.page.subtitle}">Testimonials coming soon.</p>
        </div>

        <!-- Success Flash -->
        <div th:if="${reviewSubmitted}" class="alert alert-success text-center mb-4" role="alert">
            <i class="fa-solid fa-circle-check me-2"></i>
            <span th:text="#{testimonials.form.note-text}">Your review will appear after moderation.</span>
        </div>

        <!-- Submit Form -->
        <div class="row justify-content-center mt-4">
            <div class="col-lg-7">
                <div class="booking-card" data-aos="fade-up">
                    <div class="booking-card-header">
                        <i class="fa-solid fa-star me-2"></i>
                        <span th:text="#{testimonials.form.title}">Share Your Story</span>
                    </div>
                    <form th:action="@{/testimonials/submit}" method="post" class="p-4">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold">
                                    <span th:text="#{testimonials.form.name-label}">Your Name *</span>
                                </label>
                                <input type="text" name="patientName" class="form-control nexus-input" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{testimonials.form.condition-label}">Condition Treated</label>
                                <input type="text" name="condition" class="form-control nexus-input"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold">
                                    <span th:text="#{testimonials.form.review-label}">Your Review *</span>
                                </label>
                                <textarea name="contentEn" class="form-control nexus-input" rows="4" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{testimonials.form.rating-label}">Rating</label>
                                <select name="rating" class="form-select nexus-input">
                                    <option value="5">★★★★★</option>
                                    <option value="4">★★★★☆</option>
                                    <option value="3">★★★☆☆</option>
                                </select>
                            </div>
                            <div class="col-12">
                                <button type="submit" class="btn btn-nexus-cta">
                                    <i class="fa-solid fa-paper-plane me-2"></i>
                                    <span th:text="#{testimonials.form.submit-btn}">Submit Review</span>
                                </button>
                                <p class="text-muted small mt-2 mb-0" th:text="#{testimonials.form.note-text}">Reviews are moderated.</p>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</section>

</main>
</html>
