<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:lang="${#locale.language}"
      th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>403 – Nexus Clinic</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo-icon-black.png}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Cairo:wght@400;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/nexus-polish.css}"/>
    <style>
        body { background:#0a0a0a; color:#fff; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'Montserrat',sans-serif; }
        html[dir="rtl"] body { font-family:'Cairo',sans-serif; }
        .error-num { font-size:8rem; font-weight:900; color:#ff9800; line-height:1; }
        .error-logo { height:36px; filter:brightness(0) invert(1); margin-bottom:2rem; }
    </style>
</head>
<body>
<div class="text-center px-3">
    <img th:src="@{/images/logo-full-white.png}" alt="Nexus Clinic" class="error-logo"/>
    <div class="error-num">403</div>
    <h2 class="text-white fw-bold mt-2" th:text="#{error.403.title}">Access Denied</h2>
    <p class="text-secondary mb-4" th:text="#{error.403.subtitle}">You don't have permission to view this page.</p>
    <div class="d-flex flex-wrap gap-3 justify-content-center">
        <a th:href="@{/login}" class="btn btn-nexus-cta">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Admin Login
        </a>
        <a th:href="@{/}" class="btn btn-outline-light">
            <i class="fa-solid fa-home me-2"></i>
            <span th:text="#{error.404.home}">Back to Home</span>
        </a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
