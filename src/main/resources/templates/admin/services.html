<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-nexus-cta btn-sm" data-bs-toggle="modal" data-bs-target="#serviceModal">
            <i class="fa-solid fa-plus me-1"></i>
            <span th:text="#{admin.action.add-service}">Add Service</span>
        </button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4" th:text="#{admin.col.id}">#</th>
                    <th th:text="#{admin.col.service-en}">Service EN</th>
                    <th th:text="#{admin.col.service-ar}">Service AR</th>
                    <th th:text="#{admin.col.icon}">Icon</th>
                    <th th:text="#{admin.col.slug}">Slug</th>
                    <th th:text="#{admin.col.price}">Price From</th>
                    <th th:text="#{admin.col.order}">Order</th>
                    <th th:text="#{admin.col.active}">Active</th>
                    <th th:text="#{admin.col.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="s : ${services}">
                    <td class="ps-4 text-muted small" th:text="${s.id}">1</td>
                    <td class="fw-bold" th:text="${s.nameEn}">Service EN</td>
                    <td th:text="${s.nameAr}">Service AR</td>
                    <td>
                        <i th:class="${s.iconClass ?: 'fa-solid fa-stethoscope'}" class="text-nexus-green fa-lg"></i>
                    </td>
                    <td><code th:text="${s.slug}">slug</code></td>
                    <td th:text="${s.priceFrom != null ? 'EGP ' + s.priceFrom : '–'}">–</td>
                    <td th:text="${s.sortOrder}">0</td>
                    <td>
                        <span th:if="${s.active}" class="badge bg-success" th:text="#{admin.status.active}">Active</span>
                        <span th:unless="${s.active}" class="badge bg-secondary" th:text="#{admin.status.inactive}">Inactive</span>
                    </td>
                    <td>
                        <div class="d-flex gap-1">
                            <button class="btn btn-xs btn-outline-primary"
                                    th:attr="onclick='openEditModal(' + ${s.id} + ',\'' + ${s.nameEn} + '\',\'' + ${s.nameAr} + '\',\'' + ${s.iconClass} + '\',\'' + ${s.slug} + '\',' + ${s.sortOrder} + ',' + ${s.active} + ')'"
                                    th:title="#{admin.action.edit}">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <form th:action="@{/admin/services/{id}/delete(id=${s.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-xs btn-outline-danger"
                                        th:attr="data-confirm=#{admin.confirm.delete-service}"
                                        th:title="#{admin.action.delete}">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(services)}">
                    <td colspan="9" class="text-center text-muted py-5" th:text="#{admin.empty.services}">No services yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="serviceModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--nexus-dark);border-bottom:2px solid var(--nexus-green);">
                    <h5 class="modal-title text-white" id="serviceModalLabel">
                        <i class="fa-solid fa-list-check me-2 text-nexus-green"></i>
                        <span th:text="#{admin.modal.add-edit-service}">Add / Edit Service</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form id="serviceForm" th:action="@{/admin/services/save}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="id" id="serviceId"/>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.name-en}">Name (English) *</label>
                                <input type="text" name="nameEn" id="sNameEn" class="form-control nexus-input" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.name-ar}">Name (Arabic) *</label>
                                <input type="text" name="nameAr" id="sNameAr" class="form-control nexus-input" required dir="rtl"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.desc-en}">Description (English)</label>
                                <textarea name="descriptionEn" class="form-control nexus-input" rows="3"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.desc-ar}">Description (Arabic)</label>
                                <textarea name="descriptionAr" class="form-control nexus-input" rows="3" dir="rtl"></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold" th:text="#{admin.field.icon}">Icon</label>
                                <input type="text" name="iconClass" id="sIconClass" class="form-control nexus-input"/>
                                <div class="form-text">
                                    <a href="https://fontawesome.com/icons" target="_blank" th:text="#{admin.field.icon}">fontawesome.com/icons</a>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold" th:text="#{admin.field.slug}">URL Slug</label>
                                <input type="text" name="slug" id="sSlug" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label fw-bold" th:text="#{admin.field.sort-order}">Sort Order</label>
                                <input type="number" name="sortOrder" id="sSortOrder" class="form-control nexus-input" value="0" min="0"/>
                            </div>
                            <div class="col-md-2">
                                <label class="form-label fw-bold" th:text="#{admin.field.price-from}">Price From</label>
                                <input type="number" name="priceFrom" class="form-control nexus-input" step="0.01"/>
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" name="active" id="sActive" value="true" checked/>
                                    <label class="form-check-label fw-bold" for="sActive" th:text="#{admin.field.active-visible}">Active</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" th:text="#{admin.cancel}">Cancel</button>
                        <button type="submit" class="btn btn-nexus-cta">
                            <i class="fa-solid fa-floppy-disk me-1"></i>
                            <span th:text="#{admin.action.save-service}">Save Service</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</section>
</body>
</html>
