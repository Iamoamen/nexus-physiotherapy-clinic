<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8">

            <div class="card border-0 shadow-sm">
                <div class="card-header py-3 px-4"
                     style="background:var(--nexus-dark);border-bottom:2px solid var(--nexus-green);">
                    <h6 class="mb-0 text-white fw-bold">
                        <i class="fa-solid fa-lock me-2 text-nexus-green"></i>
                        <span th:text="#{admin.password.change}">Change Password</span>
                    </h6>
                </div>

                <div class="card-body p-4">

                    <!-- Security note -->
                    <div class="alert mb-4"
                         style="background:var(--nexus-green-pale);border:1px solid var(--nexus-border);color:var(--nexus-text);">
                        <i class="fa-solid fa-shield-halved me-2 text-nexus-green"></i>
                        <span th:text="#{admin.password.security-note}">Your password is encrypted and stored securely.</span>
                    </div>

                    <form th:action="@{/admin/password}" method="post" id="passwordForm" novalidate>
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Current Password -->
                        <div class="mb-4">
                            <label class="form-label fw-bold" th:text="#{admin.password.current}">Current Password</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#f8f9fa;border-right:0;">
                                    <i class="fa-solid fa-key text-muted"></i>
                                </span>
                                <input type="password"
                                       name="currentPassword"
                                       id="currentPassword"
                                       class="form-control nexus-input"
                                       style="border-left:0;"
                                       required
                                       autocomplete="current-password"/>
                                <button class="btn btn-outline-secondary toggle-pwd" type="button"
                                        data-target="currentPassword" tabindex="-1">
                                    <i class="fa-regular fa-eye"></i>
                                </button>
                            </div>
                            <div class="form-text" th:text="#{admin.password.hint.current}">Enter your current password</div>
                        </div>

                        <!-- New Password -->
                        <div class="mb-4">
                            <label class="form-label fw-bold" th:text="#{admin.password.new}">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#f8f9fa;border-right:0;">
                                    <i class="fa-solid fa-lock text-muted"></i>
                                </span>
                                <input type="password"
                                       name="newPassword"
                                       id="newPassword"
                                       class="form-control nexus-input"
                                       style="border-left:0;"
                                       required
                                       minlength="8"
                                       autocomplete="new-password"/>
                                <button class="btn btn-outline-secondary toggle-pwd" type="button"
                                        data-target="newPassword" tabindex="-1">
                                    <i class="fa-regular fa-eye"></i>
                                </button>
                            </div>
                            <div class="form-text" th:text="#{admin.password.hint.new}">At least 8 characters</div>
                            <!-- Strength bar -->
                            <div class="mt-2" id="strengthBar" style="display:none;">
                                <div class="progress" style="height:4px;border-radius:2px;">
                                    <div class="progress-bar" id="strengthFill" role="progressbar"
                                         style="transition:width 0.3s;"></div>
                                </div>
                                <small id="strengthLabel" class="text-muted" style="font-size:0.72rem;"></small>
                            </div>
                        </div>

                        <!-- Confirm Password -->
                        <div class="mb-4">
                            <label class="form-label fw-bold" th:text="#{admin.password.confirm}">Confirm New Password</label>
                            <div class="input-group">
                                <span class="input-group-text" style="background:#f8f9fa;border-right:0;">
                                    <i class="fa-solid fa-lock-open text-muted"></i>
                                </span>
                                <input type="password"
                                       name="confirmPassword"
                                       id="confirmPassword"
                                       class="form-control nexus-input"
                                       style="border-left:0;"
                                       required
                                       autocomplete="new-password"/>
                                <button class="btn btn-outline-secondary toggle-pwd" type="button"
                                        data-target="confirmPassword" tabindex="-1">
                                    <i class="fa-regular fa-eye"></i>
                                </button>
                            </div>
                            <div class="form-text" th:text="#{admin.password.hint.confirm}">Repeat the new password</div>
                            <!-- Match indicator -->
                            <small id="matchIndicator" class="mt-1 d-block" style="font-size:0.72rem;display:none!important;"></small>
                        </div>

                        <!-- Submit -->
                        <div class="d-grid">
                            <button type="submit" class="btn btn-nexus-cta btn-lg" id="submitBtn">
                                <i class="fa-solid fa-shield-check me-2"></i>
                                <span th:text="#{admin.password.submit}">Update Password</span>
                            </button>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

    <script>
    // Toggle password visibility
    document.querySelectorAll('.toggle-pwd').forEach(btn => {
        btn.addEventListener('click', function() {
            const input = document.getElementById(this.dataset.target);
            const icon  = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        });
    });

    // Password strength meter
    const newPwd  = document.getElementById('newPassword');
    const bar     = document.getElementById('strengthBar');
    const fill    = document.getElementById('strengthFill');
    const label   = document.getElementById('strengthLabel');

    const strengthLabels = {
        en: ['Very Weak','Weak','Fair','Good','Strong'],
        ar: ['ضعيفة جداً','ضعيفة','مقبولة','جيدة','قوية']
    };
    const lang = document.documentElement.lang || 'en';
    const labels = strengthLabels[lang] || strengthLabels.en;
    const colors = ['#f44336','#ff9800','#ffc107','#4caf50','#2e7d32'];

    newPwd.addEventListener('input', function() {
        const v = this.value;
        if (!v) { bar.style.display = 'none'; return; }
        bar.style.display = 'block';
        let score = 0;
        if (v.length >= 8)  score++;
        if (v.length >= 12) score++;
        if (/[A-Z]/.test(v) && /[a-z]/.test(v)) score++;
        if (/\d/.test(v))   score++;
        if (/[^A-Za-z0-9]/.test(v)) score++;
        score = Math.min(score, 4);
        fill.style.width = ((score + 1) * 20) + '%';
        fill.style.background = colors[score];
        label.textContent = labels[score];
        label.style.color = colors[score];
        checkMatch();
    });

    // Match indicator
    const confirmPwd = document.getElementById('confirmPassword');
    const matchInd   = document.getElementById('matchIndicator');

    function checkMatch() {
        const isAr = lang === 'ar';
        if (!confirmPwd.value) { matchInd.style.display = 'none'; return; }
        matchInd.style.display = 'block';
        if (newPwd.value === confirmPwd.value) {
            matchInd.textContent = isAr ? '✓ كلمتا المرور متطابقتان' : '✓ Passwords match';
            matchInd.style.color = '#4caf50';
            confirmPwd.classList.remove('is-invalid');
            confirmPwd.classList.add('is-valid');
        } else {
            matchInd.textContent = isAr ? '✗ كلمتا المرور غير متطابقتين' : '✗ Passwords do not match';
            matchInd.style.color = '#f44336';
            confirmPwd.classList.remove('is-valid');
            confirmPwd.classList.add('is-invalid');
        }
    }

    confirmPwd.addEventListener('input', checkMatch);

    // Prevent submit if mismatch
    document.getElementById('passwordForm').addEventListener('submit', function(e) {
        if (newPwd.value !== confirmPwd.value) {
            e.preventDefault();
            confirmPwd.classList.add('is-invalid');
            confirmPwd.focus();
        }
        if (newPwd.value.length < 8) {
            e.preventDefault();
            newPwd.focus();
        }
    });
    </script>

</section>
</body>
</html>
