<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <div class="row justify-content-center">
        <div class="col-lg-10">

            <div class="card border-0 shadow-sm">
                <div class="card-header py-3 px-4"
                     style="background:var(--nexus-dark);border-bottom:2px solid var(--nexus-green);">
                    <div class="d-flex align-items-center justify-content-between">
                        <h6 class="mb-0 text-white fw-bold">
                            <i class="fa-solid fa-envelope-open-text me-2 text-nexus-green"></i>
                            <span th:text="${tpl.nameEn}">Edit Template</span>
                        </h6>
                        <code class="text-muted small" th:text="${tpl.code}">code</code>
                    </div>
                </div>

                <div class="card-body p-4">

                    <!-- Placeholder hint -->
                    <div class="alert mb-4"
                         style="background:var(--nexus-green-pale);border:1px solid var(--nexus-border);">
                        <i class="fa-solid fa-circle-info me-2 text-nexus-green"></i>
                        <span th:text="#{admin.email-templates.placeholders.hint}">Use placeholders:</span>
                        <code class="ms-2">{{name}} {{date}} {{time}} {{service}} {{phone}} {{email}} {{message}}</code>
                    </div>

                    <form th:action="@{/admin/email-templates/{id}/save(id=${tpl.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                        <!-- Active toggle -->
                        <div class="mb-4 d-flex align-items-center gap-3">
                            <div class="form-check form-switch mb-0">
                                <input class="form-check-input" type="checkbox"
                                       name="active" value="true"
                                       th:checked="${tpl.active}" id="activeSwitch"/>
                                <label class="form-check-label fw-bold" for="activeSwitch"
                                       th:text="#{admin.field.active-switch}">Active</label>
                            </div>
                            <span class="text-muted small"
                                  th:text="#{admin.email-templates.active.hint}">
                                When inactive, this email is not sent.
                            </span>
                        </div>

                        <div class="row g-4">
                            <!-- English -->
                            <div class="col-lg-6">
                                <h6 class="fw-bold mb-3">
                                    <span class="badge me-2" style="background:var(--nexus-dark);color:#fff;">EN</span>
                                    English
                                </h6>
                                <div class="mb-3">
                                    <label class="form-label fw-bold" th:text="#{admin.email-templates.subject}">Subject</label>
                                    <input type="text" name="subjectEn"
                                           class="form-control nexus-input"
                                           th:value="${tpl.subjectEn}" required/>
                                </div>
                                <div>
                                    <label class="form-label fw-bold" th:text="#{admin.email-templates.body}">Body</label>
                                    <textarea name="bodyEn" rows="16"
                                              class="form-control nexus-input"
                                              style="font-family:monospace;font-size:0.85rem;"
                                              required th:text="${tpl.bodyEn}"></textarea>
                                </div>
                            </div>

                            <!-- Arabic -->
                            <div class="col-lg-6">
                                <h6 class="fw-bold mb-3">
                                    <span class="badge me-2" style="background:var(--nexus-green);color:#000;">ع</span>
                                    العربية
                                </h6>
                                <div class="mb-3">
                                    <label class="form-label fw-bold" th:text="#{admin.email-templates.subject}">Subject</label>
                                    <input type="text" name="subjectAr"
                                           class="form-control nexus-input"
                                           dir="rtl"
                                           th:value="${tpl.subjectAr}" required/>
                                </div>
                                <div>
                                    <label class="form-label fw-bold" th:text="#{admin.email-templates.body}">Body</label>
                                    <textarea name="bodyAr" rows="16"
                                              class="form-control nexus-input"
                                              dir="rtl"
                                              style="font-family:monospace;font-size:0.85rem;"
                                              required th:text="${tpl.bodyAr}"></textarea>
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-3 mt-4">
                            <button type="submit" class="btn btn-nexus-cta">
                                <i class="fa-solid fa-floppy-disk me-2"></i>
                                <span th:text="#{admin.save}">Save</span>
                            </button>
                            <a th:href="@{/admin/email-templates}" class="btn btn-outline-secondary"
                               th:text="#{admin.cancel}">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>

</section>
</body>
</html>
