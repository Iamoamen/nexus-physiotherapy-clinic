<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="adminLayout(adminContent)"
      th:lang="${#locale.language}"
      th:dir="${#locale.language == 'ar' ? 'rtl' : 'ltr'}">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${adminPageTitle ?: 'Admin'} + ' – Nexus Admin'">Admin – Nexus Clinic</title>
    <link rel="icon" type="image/png" th:href="@{/images/logo-icon-black.png}"/>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/main.css}"/>
    <link rel="stylesheet" th:href="@{/css/components-extra.css}"/>
    <link rel="stylesheet" th:href="@{/css/rtl.css}" th:if="${#locale.language == 'ar'}"/>
    <link rel="stylesheet" th:href="@{/css/nexus-polish.css}"/>
    <link rel="stylesheet" th:href="@{/css/admin-enhanced.css}"/>
</head>
<body>

<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<div class="admin-wrapper">

    <!-- ============================================================
         SIDEBAR
    ============================================================ -->
    <aside class="admin-sidebar d-flex flex-column" id="adminSidebar">

        <!-- Brand / Logo — same image as public navbar -->
        <div class="admin-sidebar-brand">
            <a th:href="@{/admin}" class="d-block">
                <img th:src="@{/images/logo-white.png}"
                     alt="Nexus Clinic"
                     class="navbar-logo"/>
            </a>
        </div>

        <!-- Panel label -->
        <div class="sidebar-panel-label">
            <span th:text="#{admin.title}">Admin Panel</span>
        </div>

        <!-- Navigation -->
        <nav class="flex-grow-1 overflow-auto pb-2" id="sidebarNav">

            <!-- Section: Main -->
            <div class="sidebar-section-label" th:text="#{admin.section.main}">Main</div>

            <a th:href="@{/admin}" class="admin-nav-link"
               th:classappend="${currentUri == '/admin'} ? ' active'">
                <i class="fa-solid fa-gauge-high"></i>
                <span th:text="#{admin.dashboard}">Dashboard</span>
            </a>

            <a th:href="@{/admin/appointments}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/appointments')} ? ' active'">
                <i class="fa-regular fa-calendar-check"></i>
                <span th:text="#{admin.appointments}">Appointments</span>
                <span class="badge-pill-count"
                      th:if="${pendingCount != null and pendingCount > 0}"
                      th:text="${pendingCount}">0</span>
            </a>

            <!-- Section: Content -->
            <div class="sidebar-section-label" th:text="#{admin.section.content}">Content</div>

            <a th:href="@{/admin/services}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/services')} ? ' active'">
                <i class="fa-solid fa-list-check"></i>
                <span th:text="#{admin.services}">Services</span>
            </a>
            <a th:href="@{/admin/conditions}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/conditions')} ? ' active'">
                <i class="fa-solid fa-person-walking"></i>
                <span th:text="#{admin.conditions}">Conditions</span>
            </a>
            <a th:href="@{/admin/team}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/team')} ? ' active'">
                <i class="fa-solid fa-user-doctor"></i>
                <span th:text="#{admin.team}">Team</span>
            </a>
            <a th:href="@{/admin/testimonials}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/testimonials')} ? ' active'">
                <i class="fa-solid fa-star"></i>
                <span th:text="#{admin.testimonials}">Testimonials</span>
            </a>
            <a th:href="@{/admin/blog}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/blog')} ? ' active'">
                <i class="fa-solid fa-newspaper"></i>
                <span th:text="#{admin.blog}">Blog Posts</span>
            </a>
            <a th:href="@{/admin/faqs}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/faqs')} ? ' active'">
                <i class="fa-solid fa-circle-question"></i>
                <span th:text="#{admin.faqs}">FAQs</span>
            </a>

            <!-- Section: Communication -->
            <div class="sidebar-section-label" th:text="#{admin.section.communication}">Communication</div>

            <a th:href="@{/admin/email-templates}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/email-templates')} ? ' active'">
                <i class="fa-solid fa-envelope-open-text"></i>
                <span th:text="#{admin.email-templates}">Email Templates</span>
            </a>

            <a th:href="@{/admin/inquiries}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/inquiries')} ? ' active'">
                <i class="fa-solid fa-envelope"></i>
                <span th:text="#{admin.inquiries}">Inquiries</span>
                <span class="badge-pill-count badge-pill-red"
                      th:if="${unreadInquiries != null and unreadInquiries > 0}"
                      th:text="${unreadInquiries}">0</span>
            </a>

            <!-- Section: Account -->
            <div class="sidebar-section-label" th:text="#{admin.section.account}">Account</div>

            <a th:href="@{/admin/password}" class="admin-nav-link"
               th:classappend="${currentUri != null and currentUri.startsWith('/admin/password')} ? ' active'">
                <i class="fa-solid fa-lock"></i>
                <span th:text="#{admin.password.change}">Change Password</span>
            </a>

        </nav>

        <!-- Sidebar Footer -->
        <div class="sidebar-footer">

            <!-- Dashboard Language Switcher -->
            <div class="sidebar-lang-switcher">
                <i class="fa-solid fa-language sidebar-lang-icon"></i>
                <span class="sidebar-lang-label" th:text="#{admin.lang.label}">Language</span>
                <div class="ms-auto d-flex gap-1">
                    <a th:href="${currentUri + '?lang=en'}"
                       th:classappend="${#locale.language == 'en'} ? ' lang-active'"
                       class="lang-pill">EN</a>
                    <a th:href="${currentUri + '?lang=ar'}"
                       th:classappend="${#locale.language == 'ar'} ? ' lang-active'"
                       class="lang-pill">ع</a>
                </div>
            </div>

            <!-- View public website -->
            <a th:href="@{/}" target="_blank" class="admin-nav-link sidebar-footer-link">
                <i class="fa-solid fa-arrow-up-right-from-square"></i>
                <span th:text="#{admin.view-site}">View Website</span>
            </a>

            <!-- Logout -->
            <form th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="admin-nav-link sidebar-footer-link w-100 border-0 bg-transparent">
                    <i class="fa-solid fa-right-from-bracket"></i>
                    <span th:text="#{admin.logout}">Logout</span>
                </button>
            </form>
        </div>
    </aside>

    <!-- ============================================================
         MAIN CONTENT AREA
    ============================================================ -->
    <div class="admin-main d-flex flex-column" style="min-height:100vh;">

        <!-- Topbar -->
        <div class="admin-topbar">
            <div class="d-flex align-items-center gap-3">
                <!-- Mobile toggle -->
                <button class="admin-mobile-toggle d-lg-none"
                        id="sidebarToggleBtn"
                        onclick="openSidebar()"
                        aria-label="Open sidebar">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <!-- Page title -->
                <div>
                    <h5 class="mb-0 fw-bold admin-page-title"
                        th:text="${adminTitleKey != null} ? #{${adminTitleKey}} : ${adminPageTitle ?: #{admin.dashboard}}">
                        Dashboard
                    </h5>
                </div>
            </div>

            <!-- Right side: date + avatar + lang quick-switch -->
            <div class="d-flex align-items-center gap-3">
                <!-- Dashboard language switcher -->
                <div class="d-none d-md-flex align-items-center gap-1 topbar-lang">
                    <a th:href="${currentUri + '?lang=en'}"
                       th:classappend="${#locale.language == 'en'} ? ' lang-active'"
                       class="lang-pill-sm">EN</a>
                    <span class="text-muted" style="font-size:0.7rem;">|</span>
                    <a th:href="${currentUri + '?lang=ar'}"
                       th:classappend="${#locale.language == 'ar'} ? ' lang-active'"
                       class="lang-pill-sm">ع</a>
                </div>
                <!-- Date -->
                <span class="topbar-date d-none d-lg-block"
                      th:text="${#temporals.format(#temporals.createNow(), 'EEE, dd MMM yyyy')}">Date</span>
                <!-- Avatar -->
                <div class="topbar-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
        </div>

        <!-- Flash messages -->
        <div class="flash-container">
            <div th:if="${msg}"
                 class="alert alert-success alert-dismissible fade show mb-0"
                 role="alert">
                <i class="fa-solid fa-circle-check me-2"></i>
                <span th:text="${msg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            <div th:if="${errorMsg}"
                 class="alert alert-danger alert-dismissible fade show mb-0"
                 role="alert">
                <i class="fa-solid fa-triangle-exclamation me-2"></i>
                <span th:text="${errorMsg}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
        </div>

        <!-- Page content -->
        <div class="admin-content-area">
            <th:block th:replace="${adminContent}"/>
        </div>

    </div><!-- /admin-main -->
</div><!-- /admin-wrapper -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/main.js}"></script>
<script>
function openSidebar() {
    document.getElementById('adminSidebar').classList.add('show');
    document.getElementById('sidebarBackdrop').classList.add('show');
}
function closeSidebar() {
    document.getElementById('adminSidebar').classList.remove('show');
    document.getElementById('sidebarBackdrop').classList.remove('show');
}
// Close sidebar on outside click (mobile)
document.getElementById('sidebarBackdrop').addEventListener('click', closeSidebar);
</script>
</body>
</html>
