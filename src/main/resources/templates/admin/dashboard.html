<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <!-- Stats Row -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon green"><i class="fa-regular fa-calendar-check"></i></div>
                <div>
                    <div class="stat-num" th:text="${stats.totalAppointments}">0</div>
                    <div class="stat-label" th:text="#{admin.stat.total-appointments}">Total Appointments</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon orange"><i class="fa-solid fa-clock"></i></div>
                <div>
                    <div class="stat-num" th:text="${stats.pendingAppointments}">0</div>
                    <div class="stat-label" th:text="#{admin.stat.pending}">Pending</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon blue"><i class="fa-solid fa-calendar-day"></i></div>
                <div>
                    <div class="stat-num" th:text="${stats.thisMonthAppointments}">0</div>
                    <div class="stat-label" th:text="#{admin.stat.this-month}">This Month</div>
                </div>
            </div>
        </div>
        <div class="col-6 col-lg-3">
            <div class="stat-card">
                <div class="stat-icon red"><i class="fa-solid fa-envelope"></i></div>
                <div>
                    <div class="stat-num" th:text="${stats.unreadInquiries}">0</div>
                    <div class="stat-label" th:text="#{admin.stat.unread-inquiries}">Unread Inquiries</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Appointments Table -->
    <div class="card border-0 shadow-sm">
        <div class="card-header bg-white d-flex justify-content-between align-items-center py-3 px-4">
            <h6 class="mb-0 fw-bold" th:text="#{admin.recent-appointments}">Recent Appointments</h6>
            <a th:href="@{/admin/appointments}" class="btn btn-sm btn-nexus-outline" th:text="#{admin.view-all}">View All</a>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0 align-middle">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4" th:text="#{admin.col.id}">#</th>
                        <th th:text="#{admin.col.patient}">Patient</th>
                        <th th:text="#{admin.col.phone}">Phone</th>
                        <th th:text="#{admin.col.service}">Service</th>
                        <th th:text="#{admin.col.date-time}">Date &amp; Time</th>
                        <th th:text="#{admin.col.status}">Status</th>
                        <th th:text="#{admin.col.actions}">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="apt : ${recentAppointments}">
                        <td class="ps-4 text-muted small" th:text="${apt.id}">1</td>
                        <td>
                            <div class="fw-bold" th:text="${apt.patientName}">Name</div>
                            <div class="text-muted small" th:text="${apt.email}">email</div>
                        </td>
                        <td th:text="${apt.phone}">Phone</td>
                        <td>
                            <span th:text="${apt.service != null ? apt.service.nameEn : '–'}">Service</span>
                        </td>
                        <td>
                            <div th:text="${apt.preferredDate}">Date</div>
                            <div class="text-muted small" th:text="${apt.preferredTime}">Time</div>
                        </td>
                        <td>
                            <span class="badge rounded-pill"
                                  th:classappend="'badge-' + ${#strings.toLowerCase(apt.status.name())}"
                                  th:text="#{|admin.status.${#strings.toLowerCase(apt.status.name())}|}">PENDING</span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <form th:action="@{/admin/appointments/{id}/status(id=${apt.id})}" method="post"
                                      th:if="${apt.status.name() == 'PENDING'}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="status" value="CONFIRMED"/>
                                    <button type="submit" class="btn btn-xs btn-success"
                                            th:title="#{admin.action.confirm}">
                                        <i class="fa-solid fa-check"></i>
                                    </button>
                                </form>
                                <form th:action="@{/admin/appointments/{id}/status(id=${apt.id})}" method="post"
                                      th:if="${apt.status.name() == 'PENDING' or apt.status.name() == 'CONFIRMED'}">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <input type="hidden" name="status" value="CANCELLED"/>
                                    <button type="submit" class="btn btn-xs btn-danger"
                                            th:title="#{admin.action.cancel}">
                                        <i class="fa-solid fa-xmark"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(recentAppointments)}">
                        <td colspan="7" class="text-center text-muted py-4" th:text="#{admin.empty.appointments}">
                            <span th:text="#{admin.empty.appointments}">No appointments yet.</span>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</section>
</body>
</html>
