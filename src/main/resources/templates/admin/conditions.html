<!-- admin/conditions.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-nexus-cta btn-sm" data-bs-toggle="modal" data-bs-target="#condModal">
            <i class="fa-solid fa-plus me-1"></i>
            <span th:text="#{admin.action.add-condition}">Add Condition</span>
        </button>
    </div>

    <!-- Grouped by body area -->
    <div th:each="entry : ${conditionsByArea}" class="mb-4">
        <h6 class="fw-bold text-capitalize mb-2 d-flex align-items-center gap-2">
            <span class="badge" style="background:var(--nexus-green);color:#000;" th:text="${entry.key}">Area</span>
            <span class="text-muted small" th:text="${#lists.size(entry.value)} + ' conditions'"></span>
        </h6>
        <div class="card border-0 shadow-sm mb-3">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="table-light">
                    <tr>
                        <th class="ps-4" th:text="#{admin.col.id}">#</th>
                        <th th:text="#{admin.col.service-en}">Name EN</th>
                        <th th:text="#{admin.col.service-ar}">Name AR</th>
                        <th th:text="#{admin.field.body-area}">Body Area</th>
                        <th th:text="#{admin.col.slug}">Slug</th>
                        <th th:text="#{admin.col.active}">Active</th>
                        <th th:text="#{admin.col.actions}">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="c : ${entry.value}">
                        <td class="ps-4 text-muted small" th:text="${c.id}">1</td>
                        <td class="fw-bold" th:text="${c.nameEn}">Condition</td>
                        <td dir="rtl" th:text="${c.nameAr}">حالة</td>
                        <td>
                            <span class="badge rounded-pill"
                                  style="background:var(--nexus-green-pale);color:var(--nexus-green-dim);"
                                  th:text="${c.bodyArea}">Area</span>
                        </td>
                        <td><code th:text="${c.slug}">slug</code></td>
                        <td>
                            <span th:if="${c.active}" class="badge bg-success" th:text="#{admin.status.active}">Active</span>
                            <span th:unless="${c.active}" class="badge bg-secondary" th:text="#{admin.status.hidden}">Hidden</span>
                        </td>
                        <td>
                            <div class="d-flex gap-1">
                                <button class="btn btn-xs btn-outline-primary"
                                        data-bs-toggle="modal" data-bs-target="#condModal"
                                        th:title="#{admin.action.edit}">
                                    <i class="fa-solid fa-pen"></i>
                                </button>
                                <form th:action="@{/admin/conditions/{id}/delete(id=${c.id})}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="btn btn-xs btn-outline-danger"
                                            th:attr="data-confirm=#{admin.confirm.delete-condition}"
                                            th:title="#{admin.action.delete}">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </form>
                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div th:if="${#maps.isEmpty(conditionsByArea)}" class="text-center py-5 text-muted">
        <i class="fa-solid fa-person-walking fa-2x mb-2 d-block text-nexus-green"></i>
        <span th:text="#{admin.empty.conditions}">No conditions yet.</span>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="condModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--nexus-dark);border-bottom:2px solid var(--nexus-green);">
                    <h5 class="modal-title text-white">
                        <i class="fa-solid fa-person-walking me-2 text-nexus-green"></i>
                        <span th:text="#{admin.modal.add-edit-condition}">Add / Edit Condition</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/conditions/save}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="id"/>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.name-en}">Name (English) *</label>
                                <input type="text" name="nameEn" id="condNameEn" class="form-control nexus-input" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.name-ar}">Name (Arabic) *</label>
                                <input type="text" name="nameAr" class="form-control nexus-input" required dir="rtl"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.desc-en}">Description (English)</label>
                                <textarea name="descriptionEn" class="form-control nexus-input" rows="3"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.desc-ar}">Description (Arabic)</label>
                                <textarea name="descriptionAr" class="form-control nexus-input" rows="3" dir="rtl"></textarea>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold" th:text="#{admin.field.body-area}">Body Area *</label>
                                <select name="bodyArea" class="form-select nexus-input" required>
                                    <option value="">-- Select --</option>
                                    <option value="knee">Knee</option>
                                    <option value="shoulder">Shoulder</option>
                                    <option value="spine">Spine</option>
                                    <option value="ankle">Ankle</option>
                                    <option value="elbow">Elbow</option>
                                    <option value="neck">Neck</option>
                                    <option value="hip">Hip</option>
                                    <option value="wrist">Wrist</option>
                                    <option value="foot">Foot</option>
                                    <option value="general">General</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold" th:text="#{admin.field.slug}">URL Slug</label>
                                <input type="text" name="slug" id="condSlug" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold" th:text="#{admin.field.icon}">Icon</label>
                                <input type="text" name="iconClass" class="form-control nexus-input"/>
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" name="active" value="true" checked/>
                                    <label class="form-check-label fw-bold" th:text="#{admin.field.active-switch}">Active</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" th:text="#{admin.cancel}">Cancel</button>
                        <button type="submit" class="btn btn-nexus-cta">
                            <i class="fa-solid fa-floppy-disk me-1"></i>
                            <span th:text="#{admin.action.save-condition}">Save Condition</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</section>
</body>
</html>
