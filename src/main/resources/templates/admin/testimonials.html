<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4" th:text="#{admin.col.id}">#</th>
                    <th th:text="#{admin.col.patient}">Patient</th>
                    <th th:text="#{admin.col.review}">Review</th>
                    <th th:text="#{admin.col.rating}">Rating</th>
                    <th th:text="#{admin.col.condition}">Condition</th>
                    <th th:text="#{admin.col.date}">Date</th>
                    <th th:text="#{admin.col.approved}">Approved</th>
                    <th th:text="#{admin.col.featured}">Featured</th>
                    <th th:text="#{admin.col.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="t : ${testimonials}">
                    <td class="ps-4 text-muted small" th:text="${t.id}">1</td>
                    <td class="fw-bold" th:text="${t.patientName}">Name</td>
                    <td>
                        <p class="mb-0 small text-muted" th:text="${#strings.abbreviate(t.contentEn, 80)}">Review</p>
                    </td>
                    <td>
                        <span style="color:#ffd700;">
                            <i th:each="i : ${#numbers.sequence(1, t.rating ?: 5)}"
                               class="fa-solid fa-star" style="font-size:0.75rem;"></i>
                        </span>
                    </td>
                    <td class="small" th:text="${t.condition ?: '–'}">Condition</td>
                    <td class="text-muted small" th:text="${#temporals.format(t.createdAt,'dd MMM yyyy')}">Date</td>
                    <td>
                        <span th:if="${t.approved}" class="badge bg-success" th:text="#{admin.status.approved}">Approved</span>
                        <span th:unless="${t.approved}" class="badge bg-warning text-dark" th:text="#{admin.status.pending}">Pending</span>
                    </td>
                    <td>
                        <span th:if="${t.featured}" class="badge" style="background:var(--nexus-green);color:#000;" th:text="#{admin.status.featured}">Featured</span>
                        <span th:unless="${t.featured}" class="badge bg-light text-muted">–</span>
                    </td>
                    <td>
                        <div class="d-flex flex-column gap-1">
                            <form th:action="@{/admin/testimonials/{id}/approve(id=${t.id})}" method="post"
                                  th:if="${!t.approved}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-xs btn-success w-100">
                                    <i class="fa-solid fa-check me-1"></i>
                                    <span th:text="#{admin.action.approve}">Approve</span>
                                </button>
                            </form>
                            <form th:action="@{/admin/testimonials/{id}/feature(id=${t.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-xs w-100"
                                        th:classappend="${t.featured} ? 'btn-outline-warning' : 'btn-outline-secondary'">
                                    <i class="fa-solid fa-star me-1"></i>
                                    <span th:text="${t.featured} ? #{admin.action.unfeature} : #{admin.action.feature}">Feature</span>
                                </button>
                            </form>
                            <form th:action="@{/admin/testimonials/{id}/delete(id=${t.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-xs btn-outline-danger w-100"
                                        th:attr="data-confirm=#{admin.confirm.delete-testimonial}">
                                    <i class="fa-solid fa-trash me-1"></i>
                                    <span th:text="#{admin.action.delete}">Delete</span>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${testimonials.isEmpty()}">
                    <td colspan="9" class="text-center text-muted py-5" th:text="#{admin.empty.testimonials}">No testimonials yet.</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</section>
</body>
</html>
