<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <!-- Status Filters -->
    <div class="mb-4 d-flex gap-2 flex-wrap">
        <a th:href="@{/admin/appointments}"
           class="btn btn-sm" th:classappend="${filterStatus == null} ? 'btn-dark' : 'btn-outline-secondary'"
           th:text="#{admin.all}">All</a>
        <a th:href="@{/admin/appointments(status='PENDING')}"
           class="btn btn-sm" th:classappend="${filterStatus == 'PENDING'} ? 'btn-warning' : 'btn-outline-warning'"
           th:text="#{admin.status.pending}">Pending</a>
        <a th:href="@{/admin/appointments(status='CONFIRMED')}"
           class="btn btn-sm" th:classappend="${filterStatus == 'CONFIRMED'} ? 'btn-success' : 'btn-outline-success'"
           th:text="#{admin.status.confirmed}">Confirmed</a>
        <a th:href="@{/admin/appointments(status='COMPLETED')}"
           class="btn btn-sm" th:classappend="${filterStatus == 'COMPLETED'} ? 'btn-primary' : 'btn-outline-primary'"
           th:text="#{admin.status.completed}">Completed</a>
        <a th:href="@{/admin/appointments(status='CANCELLED')}"
           class="btn btn-sm" th:classappend="${filterStatus == 'CANCELLED'} ? 'btn-danger' : 'btn-outline-danger'"
           th:text="#{admin.status.cancelled}">Cancelled</a>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4" th:text="#{admin.col.id}">#</th>
                    <th th:text="#{admin.col.patient}">Patient</th>
                    <th th:text="#{admin.col.contact}">Contact</th>
                    <th th:text="#{admin.col.service}">Service</th>
                    <th th:text="#{admin.col.therapist}">Therapist</th>
                    <th th:text="#{admin.col.date-time}">Date / Time</th>
                    <th th:text="#{admin.col.status}">Status</th>
                    <th th:text="#{admin.col.booked-at}">Booked At</th>
                    <th th:text="#{admin.col.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="apt : ${appointments}">
                    <td class="ps-4 text-muted small fw-bold" th:text="${apt.id}">1</td>
                    <td>
                        <div class="fw-bold" th:text="${apt.patientName}">Name</div>
                        <div class="text-muted" style="font-size:0.78rem;" th:text="${apt.email}">–</div>
                    </td>
                    <td th:text="${apt.phone}">Phone</td>
                    <td>
                        <span th:if="${apt.service != null}" th:text="${apt.service.nameEn}">–</span>
                        <span th:unless="${apt.service != null}" class="text-muted">–</span>
                    </td>
                    <td>
                        <span th:if="${apt.therapist != null}" th:text="${apt.therapist.nameEn}">–</span>
                        <span th:unless="${apt.therapist != null}" class="text-muted" th:text="#{booking.therapist.no-pref}">–</span>
                    </td>
                    <td>
                        <div class="fw-bold" th:text="${apt.preferredDate}">–</div>
                        <div class="text-muted small" th:text="${apt.preferredTime}">–</div>
                    </td>
                    <td>
                        <span class="badge rounded-pill px-2 py-1"
                              th:classappend="'badge-' + ${#strings.toLowerCase(apt.status.name())}"
                              th:text="#{|admin.status.${#strings.toLowerCase(apt.status.name())}|}">STATUS</span>
                    </td>
                    <td class="text-muted small"
                        th:text="${#temporals.format(apt.createdAt, 'dd MMM, HH:mm')}">–</td>
                    <td>
                        <div class="d-flex gap-1">
                            <form th:action="@{/admin/appointments/{id}/status(id=${apt.id})}" method="post"
                                  th:if="${apt.status.name() == 'PENDING'}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="status" value="CONFIRMED"/>
                                <button type="submit" class="btn btn-xs btn-success"
                                        th:title="#{admin.action.confirm}">
                                    <i class="fa-solid fa-check"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/appointments/{id}/status(id=${apt.id})}" method="post"
                                  th:if="${apt.status.name() == 'CONFIRMED'}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="status" value="COMPLETED"/>
                                <button type="submit" class="btn btn-xs btn-primary"
                                        th:title="#{admin.action.complete}">
                                    <i class="fa-solid fa-flag-checkered"></i>
                                </button>
                            </form>
                            <form th:action="@{/admin/appointments/{id}/status(id=${apt.id})}" method="post"
                                  th:if="${apt.status.name() == 'PENDING' or apt.status.name() == 'CONFIRMED'}">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <input type="hidden" name="status" value="CANCELLED"/>
                                <button type="submit" class="btn btn-xs btn-danger"
                                        th:title="#{admin.action.cancel}"
                                        th:attr="data-confirm=#{admin.confirm.cancel-apt}">
                                    <i class="fa-solid fa-xmark"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${appointments.isEmpty()}">
                    <td colspan="9" class="text-center text-muted py-5">
                        <i class="fa-regular fa-calendar-xmark fa-2x mb-2 d-block"></i>
                        <span th:text="#{admin.empty.appointments}">No appointments found.</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3 px-4"
             th:if="${appointments.totalPages > 1}">
            <span class="text-muted small">
                <span th:text="#{admin.pagination.showing}">Showing</span>
                <span th:text="${appointments.number * appointments.size + 1}">1</span>
                <span th:text="#{admin.pagination.to}">–</span>
                <span th:text="${(appointments.number + 1) * appointments.size}">15</span>
                <span th:text="#{admin.pagination.of}">of</span>
                <span th:text="${appointments.totalElements}">100</span>
            </span>
            <div class="d-flex gap-1">
                <a th:href="@{/admin/appointments(page=${appointments.number - 1}, status=${filterStatus})}"
                   class="btn btn-sm btn-outline-secondary"
                   th:classappend="${!appointments.hasPrevious()} ? disabled">
                    <i class="fa-solid fa-chevron-left"></i>
                </a>
                <a th:href="@{/admin/appointments(page=${appointments.number + 1}, status=${filterStatus})}"
                   class="btn btn-sm btn-outline-secondary"
                   th:classappend="${!appointments.hasNext()} ? disabled">
                    <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>
        </div>
    </div>

</section>
</body>
</html>
