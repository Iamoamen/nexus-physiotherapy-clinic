<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-nexus-cta btn-sm" data-bs-toggle="modal" data-bs-target="#therapistModal">
            <i class="fa-solid fa-plus me-1"></i>
            <span th:text="#{admin.action.add-therapist}">Add Therapist</span>
        </button>
    </div>

    <div class="row g-4">
        <div th:each="t : ${therapists}" class="col-lg-4 col-md-6">
            <div class="card border-0 shadow-sm h-100">
                <div class="card-body">
                    <div class="d-flex align-items-center gap-3 mb-3">
                        <img th:src="${t.photoUrl ?: '/images/placeholder-therapist.jpg'}"
                             th:alt="${t.nameEn}"
                             style="width:48px;height:48px;object-fit:cover;border-radius:50%;border:2px solid var(--nexus-green);"/>
                        <div>
                            <div class="fw-bold" th:text="${t.nameEn}">Name</div>
                            <div class="text-muted small" th:text="${t.titleEn}">Title</div>
                        </div>
                    </div>
                    <div class="mb-2">
                        <span class="badge rounded-pill"
                              style="background:var(--nexus-green-pale);color:var(--nexus-green-dim);"
                              th:text="${t.specialization}">Spec</span>
                    </div>
                    <div class="text-muted small mb-2" th:if="${t.yearsExperience != null}">
                        <i class="fa-solid fa-briefcase me-1"></i>
                        <span th:text="${t.yearsExperience} + ' ' + #{team.years}">5 years exp.</span>
                    </div>
                    <p class="small text-muted mb-3" th:if="${t.bioEn}"
                       th:text="${#strings.abbreviate(t.bioEn, 120)}">Bio</p>
                    <div>
                        <span th:if="${t.active}" class="badge bg-success" th:text="#{admin.status.active}">Active</span>
                        <span th:unless="${t.active}" class="badge bg-secondary" th:text="#{admin.status.inactive}">Inactive</span>
                    </div>
                </div>
                <div class="card-footer bg-transparent border-top d-flex gap-2">
                    <button class="btn btn-sm btn-outline-primary flex-grow-1"
                            th:attr="onclick='openTherapistEdit(' + ${t.id} + ')'"
                            th:title="#{admin.action.edit}">
                        <i class="fa-solid fa-pen me-1"></i>
                        <span th:text="#{admin.action.edit}">Edit</span>
                    </button>
                    <form th:action="@{/admin/team/{id}/delete(id=${t.id})}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                th:attr="data-confirm=#{admin.confirm.delete-therapist}"
                                th:title="#{admin.action.delete}">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </form>
                </div>
            </div>
        </div>
        <div th:if="${#lists.isEmpty(therapists)}" class="col-12">
            <div class="text-center py-5 text-muted">
                <i class="fa-solid fa-users fa-2x mb-3 d-block text-nexus-green"></i>
                <span th:text="#{admin.empty.therapists}">No therapists yet.</span>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal fade" id="therapistModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--nexus-dark);border-bottom:2px solid var(--nexus-green);">
                    <h5 class="modal-title text-white">
                        <i class="fa-solid fa-user-doctor me-2 text-nexus-green"></i>
                        <span th:text="#{admin.modal.add-edit-therapist}">Add / Edit Therapist</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/team/save}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="id" id="therapistId"/>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.name-en}">Full Name (English) *</label>
                                <input type="text" name="nameEn" id="tNameEn" class="form-control nexus-input" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.name-ar}">Full Name (Arabic) *</label>
                                <input type="text" name="nameAr" id="tNameAr" class="form-control nexus-input" required dir="rtl"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.title-en}">Title (English)</label>
                                <input type="text" name="titleEn" id="tTitleEn" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.title-ar}">Title (Arabic)</label>
                                <input type="text" name="titleAr" id="tTitleAr" class="form-control nexus-input" dir="rtl"/>
                            </div>
                            <div class="col-md-8">
                                <label class="form-label fw-bold" th:text="#{admin.field.specialization}">Specialization</label>
                                <input type="text" name="specialization" id="tSpec" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold" th:text="#{admin.field.years-exp}">Years of Experience</label>
                                <input type="number" name="yearsExperience" id="tYears" class="form-control nexus-input" min="0" max="50"/>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.bio-en}">Bio (English)</label>
                                <textarea name="bioEn" id="tBioEn" class="form-control nexus-input" rows="3"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.bio-ar}">Bio (Arabic)</label>
                                <textarea name="bioAr" id="tBioAr" class="form-control nexus-input" rows="3" dir="rtl"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.photo-url}">Photo URL</label>
                                <input type="text" name="photoUrl" id="tPhoto" class="form-control nexus-input"/>
                                <div class="form-text" th:text="#{admin.field.photo-hint}">Upload image and enter path.</div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.instagram}">Instagram URL</label>
                                <input type="url" name="instagramUrl" id="tInstagram" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.linkedin}">LinkedIn URL</label>
                                <input type="url" name="linkedinUrl" id="tLinkedin" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold" th:text="#{admin.field.sort-order}">Sort Order</label>
                                <input type="number" name="sortOrder" id="tOrder" class="form-control nexus-input" value="0" min="0"/>
                            </div>
                            <div class="col-12">
                                <div class="form-check form-switch">
                                    <input class="form-check-input" type="checkbox" name="active" value="true" id="tActive" checked/>
                                    <label class="form-check-label fw-bold" for="tActive" th:text="#{admin.field.active-visible}">Active</label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" th:text="#{admin.cancel}">Cancel</button>
                        <button type="submit" class="btn btn-nexus-cta">
                            <i class="fa-solid fa-floppy-disk me-1"></i>
                            <span th:text="#{admin.action.save-therapist}">Save Therapist</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</section>
</body>
</html>
