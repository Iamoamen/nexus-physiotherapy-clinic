<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <div class="d-flex justify-content-end mb-3">
        <button class="btn btn-nexus-cta btn-sm" data-bs-toggle="modal" data-bs-target="#blogModal">
            <i class="fa-solid fa-plus me-1"></i>
            <span th:text="#{admin.action.add-service}">New Post</span>
        </button>
    </div>

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4" th:text="#{admin.col.id}">#</th>
                    <th th:text="#{admin.field.title-en-blog}">Title EN</th>
                    <th th:text="#{admin.field.author}">Author</th>
                    <th th:text="#{admin.col.category}">Category</th>
                    <th th:text="#{admin.field.status-label}">Status</th>
                    <th th:text="#{blog.published}">Published</th>
                    <th th:text="#{admin.col.date}">Created</th>
                    <th th:text="#{admin.col.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="post : ${posts}">
                    <td class="ps-4 text-muted small" th:text="${post.id}">1</td>
                    <td>
                        <div class="fw-bold" th:text="${post.titleEn}">Title</div>
                        <div class="text-muted" style="font-size:0.75rem;" th:text="${post.slug}">slug</div>
                    </td>
                    <td th:text="${post.authorName ?: '–'}">Author</td>
                    <td>
                        <span th:if="${post.category}" class="badge rounded-pill"
                              style="background:var(--nexus-green-pale);color:var(--nexus-green-dim);"
                              th:text="${post.category}">Cat</span>
                    </td>
                    <td>
                        <span th:if="${post.status.name() == 'PUBLISHED'}" class="badge bg-success"
                              th:text="#{admin.blog.published}">Published</span>
                        <span th:if="${post.status.name() == 'DRAFT'}" class="badge bg-warning text-dark"
                              th:text="#{admin.blog.draft}">Draft</span>
                    </td>
                    <td class="text-muted small"
                        th:text="${post.publishedDate != null ? #temporals.format(post.publishedDate,'dd MMM yyyy') : '–'}">Date</td>
                    <td class="text-muted small"
                        th:text="${#temporals.format(post.createdAt,'dd MMM yyyy')}">Created</td>
                    <td>
                        <div class="d-flex gap-1">
                            <a th:href="@{/blog/{slug}(slug=${post.slug})}" target="_blank"
                               class="btn btn-xs btn-outline-secondary" th:title="#{admin.action.view}">
                                <i class="fa-solid fa-eye"></i>
                            </a>
                            <button class="btn btn-xs btn-outline-primary" th:title="#{admin.action.edit}"
                                    data-bs-toggle="modal" data-bs-target="#blogModal">
                                <i class="fa-solid fa-pen"></i>
                            </button>
                            <form th:action="@{/admin/blog/{id}/delete(id=${post.id})}" method="post">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                <button type="submit" class="btn btn-xs btn-outline-danger"
                                        th:title="#{admin.action.delete}"
                                        th:attr="data-confirm=#{admin.confirm.delete-service}">
                                    <i class="fa-solid fa-trash"></i>
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(posts)}">
                    <td colspan="8" class="text-center text-muted py-5">
                        <i class="fa-solid fa-newspaper fa-2x mb-2 d-block text-nexus-green"></i>
                        <span th:text="#{admin.empty.blog}">No blog posts yet.</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- Blog Modal -->
    <div class="modal fade" id="blogModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header" style="background:var(--nexus-dark);border-bottom:2px solid var(--nexus-green);">
                    <h5 class="modal-title text-white">
                        <i class="fa-solid fa-newspaper me-2 text-nexus-green"></i>
                        <span th:text="#{admin.mgmt.blog}">Blog Post Editor</span>
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <form th:action="@{/admin/blog/save}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <input type="hidden" name="id" id="blogPostId"/>
                    <div class="modal-body">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.title-en-blog}">Title (English) *</label>
                                <input type="text" name="titleEn" id="blogTitleEn" class="form-control nexus-input" required/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.title-ar-blog}">Title (Arabic)</label>
                                <input type="text" name="titleAr" class="form-control nexus-input" dir="rtl"/>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.summary-en}">Summary (English)</label>
                                <textarea name="summaryEn" class="form-control nexus-input" rows="2"></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-bold" th:text="#{admin.field.summary-ar}">Summary (Arabic)</label>
                                <textarea name="summaryAr" class="form-control nexus-input" rows="2" dir="rtl"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.content-en}">Full Content (English)</label>
                                <textarea name="contentEn" class="form-control nexus-input" rows="8"></textarea>
                            </div>
                            <div class="col-12">
                                <label class="form-label fw-bold" th:text="#{admin.field.content-ar}">Full Content (Arabic)</label>
                                <textarea name="contentAr" class="form-control nexus-input" rows="8" dir="rtl"></textarea>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold" th:text="#{admin.field.slug}">URL Slug *</label>
                                <input type="text" name="slug" id="blogSlug" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold" th:text="#{admin.col.category}">Category</label>
                                <select name="category" class="form-select nexus-input">
                                    <option value="">-- Select --</option>
                                    <option value="Rehabilitation">Rehabilitation</option>
                                    <option value="Sports Medicine">Sports Medicine</option>
                                    <option value="Pain Management">Pain Management</option>
                                    <option value="Prevention">Prevention</option>
                                    <option value="Performance">Performance</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold" th:text="#{admin.field.author}">Author Name</label>
                                <input type="text" name="authorName" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold" th:text="#{admin.field.publish-date}">Publish Date</label>
                                <input type="date" name="publishedDate" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-9">
                                <label class="form-label fw-bold" th:text="#{admin.field.cover-image}">Cover Image URL</label>
                                <input type="text" name="coverImageUrl" class="form-control nexus-input"/>
                            </div>
                            <div class="col-md-3">
                                <label class="form-label fw-bold" th:text="#{admin.field.status-label}">Status</label>
                                <select name="status" class="form-select nexus-input">
                                    <option value="DRAFT" th:text="#{admin.blog.draft}">Draft</option>
                                    <option value="PUBLISHED" th:text="#{admin.blog.published}">Published</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal" th:text="#{admin.cancel}">Cancel</button>
                        <button type="submit" class="btn btn-nexus-cta">
                            <i class="fa-solid fa-floppy-disk me-1"></i>
                            <span th:text="#{admin.save}">Save Post</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</section>
</body>
</html>
