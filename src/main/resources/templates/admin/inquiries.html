<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{admin/layout :: adminLayout(adminContent=~{::section#content})}">
<body>
<section id="content" th:fragment="adminContent">

    <div class="card border-0 shadow-sm">
        <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark">
                <tr>
                    <th class="ps-4" th:text="#{admin.col.id}">#</th>
                    <th th:text="#{admin.col.name}">Name</th>
                    <th th:text="#{admin.col.contact}">Contact</th>
                    <th th:text="#{admin.col.subject}">Subject</th>
                    <th th:text="#{admin.col.message}">Message</th>
                    <th th:text="#{admin.col.received}">Received</th>
                    <th th:text="#{admin.col.status}">Status</th>
                    <th th:text="#{admin.col.actions}">Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="inq : ${inquiries}"
                    th:classappend="${!inq.replied} ? 'table-warning fw-bold' : ''">
                    <td class="ps-4 text-muted small" th:text="${inq.id}">1</td>
                    <td class="fw-bold" th:text="${inq.name}">Name</td>
                    <td>
                        <div th:if="${inq.email}">
                            <a th:href="'mailto:' + ${inq.email}" class="small" th:text="${inq.email}">email</a>
                        </div>
                        <div th:if="${inq.phone}">
                            <a th:href="'tel:' + ${inq.phone}" class="small text-muted" th:text="${inq.phone}">phone</a>
                        </div>
                    </td>
                    <td class="fw-bold small" th:text="${inq.subject}">Subject</td>
                    <td>
                        <button class="btn btn-xs btn-outline-secondary"
                                data-bs-toggle="modal"
                                th:data-bs-target="'#msg' + ${inq.id}">
                            <i class="fa-solid fa-eye me-1"></i>
                            <span th:text="#{admin.action.view}">View</span>
                        </button>
                        <!-- Message Modal -->
                        <div class="modal fade" th:id="'msg' + ${inq.id}" tabindex="-1">
                            <div class="modal-dialog">
                                <div class="modal-content">
                                    <div class="modal-header">
                                        <h6 class="modal-title fw-bold" th:text="${inq.subject}">Subject</h6>
                                        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                                    </div>
                                    <div class="modal-body">
                                        <p class="text-muted small mb-2">
                                            <span th:text="#{admin.modal.from}">From</span>:
                                            <strong th:text="${inq.name}">Name</strong>
                                            &bull; <span th:text="${inq.email}">email</span>
                                        </p>
                                        <hr/>
                                        <p th:text="${inq.message}">Message</p>
                                    </div>
                                    <div class="modal-footer">
                                        <a th:href="'mailto:' + ${inq.email} + '?subject=Re: ' + ${inq.subject}"
                                           class="btn btn-nexus-cta btn-sm"
                                           th:if="${inq.email}">
                                            <i class="fa-solid fa-reply me-1"></i>
                                            <span th:text="#{admin.action.reply-email}">Reply by Email</span>
                                        </a>
                                        <a th:href="'https://wa.me/' + ${#strings.replace(inq.phone, ' ', '')}"
                                           target="_blank"
                                           class="btn btn-whatsapp btn-sm"
                                           th:if="${inq.phone}">
                                            <i class="fa-brands fa-whatsapp me-1"></i>
                                            <span th:text="#{topbar.whatsapp}">WhatsApp</span>
                                        </a>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </td>
                    <td class="text-muted small" th:text="${#temporals.format(inq.createdAt,'dd MMM, HH:mm')}">Date</td>
                    <td>
                        <span th:if="${inq.replied}" class="badge bg-success" th:text="#{admin.status.replied}">Replied</span>
                        <span th:unless="${inq.replied}" class="badge bg-danger" th:text="#{admin.status.new}">New</span>
                    </td>
                    <td>
                        <form th:action="@{/admin/inquiries/{id}/replied(id=${inq.id})}" method="post"
                              th:if="${!inq.replied}">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                            <button type="submit" class="btn btn-xs btn-outline-success">
                                <i class="fa-solid fa-check me-1"></i>
                                <span th:text="#{admin.action.mark-replied}">Mark Replied</span>
                            </button>
                        </form>
                    </td>
                </tr>
                <tr th:if="${inquiries.isEmpty()}">
                    <td colspan="8" class="text-center text-muted py-5">
                        <i class="fa-regular fa-envelope-open fa-2x mb-2 d-block text-nexus-green"></i>
                        <span th:text="#{admin.empty.inquiries}">No inquiries yet.</span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3 px-4"
             th:if="${inquiries.totalPages > 1}">
            <span class="text-muted small">
                <span th:text="#{admin.pagination.page}">Page</span>
                <span th:text="${inquiries.number + 1}">1</span>
                <span th:text="#{admin.pagination.pages}">of</span>
                <span th:text="${inquiries.totalPages}">5</span>
            </span>
            <div class="d-flex gap-1">
                <a th:href="@{/admin/inquiries(page=${inquiries.number - 1})}"
                   class="btn btn-sm btn-outline-secondary"
                   th:classappend="${!inquiries.hasPrevious()} ? disabled">
                    <i class="fa-solid fa-chevron-left"></i>
                </a>
                <a th:href="@{/admin/inquiries(page=${inquiries.number + 1})}"
                   class="btn btn-sm btn-outline-secondary"
                   th:classappend="${!inquiries.hasNext()} ? disabled">
                    <i class="fa-solid fa-chevron-right"></i>
                </a>
            </div>
        </div>
    </div>

</section>
</body>
</html>
