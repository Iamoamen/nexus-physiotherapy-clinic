# ==========================================================
# NEXUS CLINIC — application.properties
# Base config used in development.
# In production (Docker) every value is overridden by
# environment variables set in docker-compose / .env
# ==========================================================

spring.application.name=nexus-clinic

# ── Server ─────────────────────────────────────────────────
server.port=8080
server.servlet.context-path=/

# Never expose stack traces, exception messages, or binding
# errors to the browser — in dev or production.
server.error.include-stacktrace=never
server.error.include-message=never
server.error.include-binding-errors=never

# ── Database ────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/nexus_clinic?useSSL=false&serverTimezone=Africa/Cairo&allowPublicKeyRetrieval=true
spring.datasource.username=nexus_user
spring.datasource.password=nexus_pass
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── JPA ────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ── Flyway ─────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ── Thymeleaf ──────────────────────────────────────────────
# cache=false in dev; overridden to true in production via env var
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ── Mail ───────────────────────────────────────────────────
spring.mail.host=${MAIL_HOST:smtp-relay.brevo.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USER:}
spring.mail.password=${MAIL_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000

# ── Session ─────────────────────────────────────────────────
server.servlet.session.timeout=30m
server.servlet.session.cookie.http-only=true
# secure=false locally (no HTTPS); production Nginx handles HTTPS
# Docker env var SERVER_SERVLET_SESSION_COOKIE_SECURE=true overrides this
# secure cookie: false in dev profile, true in prod via env var
server.servlet.session.cookie.same-site=strict

# ── App ─────────────────────────────────────────────────────
app.clinic.name=Nexus Clinic
app.clinic.phone=+20103-5411305
app.clinic.whatsapp=+201035411305
app.clinic.email=info@nexusclinic.eg
app.clinic.address=Heliopolis, Cairo, Egypt
app.clinic.google-maps-embed=https://www.google.com/maps/embed?...
app.admin.default-password=${ADMIN_PASS:nexus@admin2025}

# ── Logging ─────────────────────────────────────────────────
logging.level.com.nexus=INFO
logging.level.org.springframework.security=WARN
# Prevent patient names / phones appearing in SQL logs
logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=OFF
