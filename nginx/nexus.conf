# ============================================================
# Nexus Clinic — Nginx Configuration
# Public site:  nexusclinic.eg
# Admin panel:  admin.nexusclinic.eg  (or nexus-admin.com)
# ============================================================

# Rate limiting zones (must be at http level — outside all server blocks)
limit_req_zone $binary_remote_addr zone=login:10m  rate=5r/m;
limit_req_zone $binary_remote_addr zone=api:10m    rate=30r/m;
limit_req_zone $binary_remote_addr zone=admin:10m  rate=20r/m;
limit_req_zone $binary_remote_addr zone=global:10m rate=60r/m;

# ── HTTP → HTTPS redirects ────────────────────────────────────

# Public site HTTP redirect
server {
    listen 80;
    server_name nexusclinic.eg www.nexusclinic.eg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://nexusclinic.eg$request_uri;
    }
}

# Admin domain HTTP redirect
server {
    listen 80;
    server_name admin.nexusclinic.eg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://admin.nexusclinic.eg$request_uri;
    }
}

# ── PUBLIC WEBSITE — nexusclinic.eg ──────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name nexusclinic.eg www.nexusclinic.eg;

    ssl_certificate     /etc/nginx/certs/public/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/public/privkey.pem;

    # Modern TLS only
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;

    # Block any attempt to reach /admin/** from the public domain
    location /admin {
        return 403;
    }
    location /login {
        return 403;
    }
    location /logout {
        return 403;
    }

    # Rate limit the public API
    location /api/ {
        limit_req zone=api burst=15 nodelay;
        limit_req_status 429;
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|svg|webp|ttf|otf)$ {
        proxy_pass       http://app:8080;
        expires          30d;
        add_header       Cache-Control "public, immutable";
        access_log       off;
    }

    # Public pages
    location / {
        limit_req zone=global burst=20 nodelay;
        proxy_pass             http://app:8080;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     60s;
        proxy_connect_timeout  10s;
        client_max_body_size   10M;
    }
}

# ── ADMIN DASHBOARD — admin.nexusclinic.eg ───────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name admin.nexusclinic.eg;

    ssl_certificate     /etc/nginx/certs/admin/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/admin/privkey.pem;

    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       1d;
    ssl_session_tickets       off;

    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    # Extra: prevent search engine indexing of admin panel
    add_header X-Robots-Tag "noindex, nofollow" always;

    # Block everything except /admin, /login, /logout, /api/v1/health
    # Anyone hitting / on admin domain goes straight to login
    location = / {
        return 301 /login;
    }

    # Login — tightest rate limit
    location = /login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Admin pages — rate limited
    location /admin {
        limit_req zone=admin burst=10 nodelay;
        proxy_pass             http://app:8080;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_set_header       X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header       X-Forwarded-Proto $scheme;
        proxy_read_timeout     60s;
        client_max_body_size   10M;
    }

    # Logout
    location /logout {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Static files needed by admin (CSS, JS, images)
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|woff|woff2|svg|webp|ttf|otf)$ {
        proxy_pass       http://app:8080;
        expires          30d;
        add_header       Cache-Control "public, immutable";
        access_log       off;
    }

    # Health check only — everything else on admin domain is blocked
    location = /api/v1/health {
        proxy_pass       http://app:8080;
        access_log       off;
    }

    # Block everything else — no public pages on admin domain
    location / {
        return 404;
    }
}
